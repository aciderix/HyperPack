name: Build

on:
  push:
    branches: [main, master, 'claude/**']
  pull_request:
  workflow_dispatch:

jobs:
  # ─── Linux x86-64 ────────────────────────────────────────────────────────
  build-linux:
    name: Linux (x86-64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: gcc -O2 -Wall -o hyperpack src/hyperpack.c -lm -lpthread

      - name: Smoke test
        run: |
          echo "HyperPack smoke test" > test.txt
          ./hyperpack c test.txt test.hpk
          ./hyperpack d test.hpk test_out.txt
          diff test.txt test_out.txt

      - uses: actions/upload-artifact@v4
        with:
          name: hyperpack-linux-x64
          path: hyperpack

  # ─── macOS universal (x86-64 + arm64) ────────────────────────────────────
  build-macos:
    name: macOS (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build x86-64
        run: clang -O2 -Wall -target x86_64-apple-macos11 -o hyperpack_x64 src/hyperpack.c -lm -lpthread

      - name: Build arm64
        run: clang -O2 -Wall -target arm64-apple-macos11 -o hyperpack_arm64 src/hyperpack.c -lm -lpthread

      - name: Create universal binary
        run: lipo -create hyperpack_x64 hyperpack_arm64 -output hyperpack

      - uses: actions/upload-artifact@v4
        with:
          name: hyperpack-macos-universal
          path: hyperpack

  # ─── Windows x86-64 (MSYS2 / MinGW-w64) ─────────────────────────────────
  build-windows:
    name: Windows (x86-64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: mingw-w64-x86_64-gcc diffutils

      - name: Build
        run: gcc -O2 -Wall -o hyperpack.exe src/hyperpack.c -lm -lpthread

      - name: Smoke test
        run: |
          echo "HyperPack smoke test" > test.txt
          ./hyperpack.exe c test.txt test.hpk
          ./hyperpack.exe d test.hpk test_out.txt
          diff test.txt test_out.txt

      - uses: actions/upload-artifact@v4
        with:
          name: hyperpack-windows-x64
          path: hyperpack.exe

  # ─── WASM + Web frontend ──────────────────────────────────────────────────
  build-wasm:
    name: WASM + Web frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: '3.1.74'
          actions-cache-folder: emsdk-cache

      - name: Build WASM
        run: bash build-wasm.sh

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend deps
        run: cd hyperpack-web && npm install

      - name: Type-check frontend
        run: cd hyperpack-web && npm run lint

      - name: Build frontend
        run: cd hyperpack-web && npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: hyperpack-wasm
          path: |
            hyperpack-web/public/hyperpack.js
            hyperpack-web/public/hyperpack.wasm

      - uses: actions/upload-artifact@v4
        with:
          name: hyperpack-web-dist
          path: hyperpack-web/dist/

  # ─── Tauri desktop app (Linux) ────────────────────────────────────────────
  build-tauri-linux:
    name: Tauri (Linux x86-64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: hyperpack-web/src-tauri

      - name: Install frontend deps
        run: cd hyperpack-web && npm install

      - name: Build Tauri app
        run: cd hyperpack-web && npm run tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: hyperpack-tauri-linux
          path: |
            hyperpack-web/src-tauri/target/release/bundle/deb/*.deb
            hyperpack-web/src-tauri/target/release/bundle/appimage/*.AppImage
            hyperpack-web/src-tauri/target/release/hyperpack

  # ─── Tauri desktop app (macOS) ────────────────────────────────────────────
  build-tauri-macos:
    name: Tauri (macOS universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust (universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: hyperpack-web/src-tauri

      - name: Install frontend deps
        run: cd hyperpack-web && npm install

      - name: Build Tauri app (universal)
        run: cd hyperpack-web && npm run tauri build -- --target universal-apple-darwin

      - uses: actions/upload-artifact@v4
        with:
          name: hyperpack-tauri-macos
          path: hyperpack-web/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  # ─── Tauri desktop app (Windows) ──────────────────────────────────────────
  build-tauri-windows:
    name: Tauri (Windows x86-64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # MinGW-w64 is required to compile the POSIX C engine (dirent.h, pthread.h, unistd.h)
      - name: Install MinGW-w64 via MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: mingw-w64-x86_64-gcc

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust (MSVC toolchain)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: hyperpack-web/src-tauri

      - name: Add MinGW-w64 to PATH
        # build.rs calls .compiler("gcc") explicitly so only our C code uses MinGW.
        # We do NOT set CC/AR env vars globally to avoid breaking other cc crates
        # (vswhom-sys, etc.) that expect MSVC tools.
        shell: pwsh
        run: Add-Content $env:GITHUB_PATH "C:\msys64\mingw64\bin"

      - name: Install frontend deps
        run: cd hyperpack-web && npm install

      - name: Build Tauri app
        run: cd hyperpack-web && npm run tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: hyperpack-tauri-windows
          path: hyperpack-web/src-tauri/target/release/bundle/msi/*.msi
