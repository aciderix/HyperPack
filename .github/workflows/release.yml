name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ─── CLI binaries ──────────────────────────────────────────────────────────
  cli-linux:
    name: CLI — Linux (x86-64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: gcc -O2 -Wall -o hyperpack src/hyperpack.c -lm -lpthread
      - uses: actions/upload-artifact@v4
        with:
          name: cli-linux-x64
          path: hyperpack

  cli-macos:
    name: CLI — macOS (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: clang -O2 -Wall -target x86_64-apple-macos11 -o hyperpack_x64 src/hyperpack.c -lm -lpthread
      - run: clang -O2 -Wall -target arm64-apple-macos11  -o hyperpack_arm64 src/hyperpack.c -lm -lpthread
      - run: lipo -create hyperpack_x64 hyperpack_arm64 -output hyperpack
      - uses: actions/upload-artifact@v4
        with:
          name: cli-macos-universal
          path: hyperpack

  cli-windows:
    name: CLI — Windows (x86-64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: mingw-w64-x86_64-gcc diffutils
      - run: gcc -O2 -Wall -o hyperpack.exe src/hyperpack.c -lm -lpthread
      - uses: actions/upload-artifact@v4
        with:
          name: cli-windows-x64
          path: hyperpack.exe

  # ─── Tauri desktop apps ────────────────────────────────────────────────────
  tauri-linux:
    name: Desktop — Linux (x86-64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: hyperpack-web/src-tauri
      - run: cd hyperpack-web && npm install
      - run: cd hyperpack-web && npm run tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: |
            hyperpack-web/src-tauri/target/release/bundle/deb/*.deb
            hyperpack-web/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: ignore

  tauri-macos:
    name: Desktop — macOS (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: hyperpack-web/src-tauri
      - run: cd hyperpack-web && npm install
      - run: cd hyperpack-web && npm run tauri build -- --target universal-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: hyperpack-web/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: ignore

  tauri-windows:
    name: Desktop — Windows (x86-64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: mingw-w64-x86_64-gcc
      - name: Add MinGW-w64 to PATH
        shell: pwsh
        run: Add-Content $env:GITHUB_PATH "C:\msys64\mingw64\bin"
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-gnu
          targets: x86_64-pc-windows-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: hyperpack-web/src-tauri
      - run: cd hyperpack-web && npm install
      - run: cd hyperpack-web && npm run tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: |
            hyperpack-web/src-tauri/target/release/bundle/nsis/*.exe
            hyperpack-web/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: ignore

  # ─── Publish GitHub Release ────────────────────────────────────────────────
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [cli-linux, cli-macos, cli-windows, tauri-linux, tauri-macos, tauri-windows]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Stage release files
        run: |
          mkdir -p release-files
          # CLI binaries
          cp release-artifacts/cli-linux-x64/hyperpack         release-files/hyperpack-linux-x64
          cp release-artifacts/cli-macos-universal/hyperpack   release-files/hyperpack-macos-universal
          cp release-artifacts/cli-windows-x64/hyperpack.exe   release-files/hyperpack-windows-x64.exe
          # Desktop installers — copy whatever exists
          find release-artifacts/desktop-linux  -type f \( -name '*.deb' -o -name '*.AppImage' \) \
            -exec cp {} release-files/ \; 2>/dev/null || true
          find release-artifacts/desktop-macos  -type f -name '*.dmg'  \
            -exec cp {} release-files/ \; 2>/dev/null || true
          find release-artifacts/desktop-windows -type f \( -name '*.exe' -o -name '*.msi' \) \
            -exec cp {} release-files/ \; 2>/dev/null || true
          ls -lh release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: HyperPack ${{ github.ref_name }}
          body: |
            ## HyperPack ${{ github.ref_name }}

            ### Desktop apps (Tauri — native engine, no size limit)
            | Platform | Installer |
            |----------|-----------|
            | Linux | `.AppImage` (portable) · `.deb` (Debian/Ubuntu) |
            | macOS | `.dmg` (Apple Silicon + Intel universal) |
            | Windows | `.exe` (NSIS installer) |

            ### CLI binaries (direct compression engine)
            | Platform | Binary |
            |----------|--------|
            | Linux x86-64 | `hyperpack-linux-x64` |
            | macOS universal | `hyperpack-macos-universal` |
            | Windows x86-64 | `hyperpack-windows-x64.exe` |

            ### Web app
            Try it directly in your browser at **https://aciderix.github.io/HyperPack/**

            ### Usage (CLI)
            ```bash
            # Compress
            ./hyperpack c input.bin output.hpk

            # Decompress
            ./hyperpack d output.hpk restored.bin

            # Archive (multi-file)
            ./hyperpack a mydir/ archive.hpk
            ./hyperpack x archive.hpk ./output/
            ```
          files: release-files/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
